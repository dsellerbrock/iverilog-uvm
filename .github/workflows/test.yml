name: test

on:
  # Every push onto the main branch triggers a retest.
  push:
    branches:
      - main
  # All pull_requests trigger a retest.
  pull_request:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  mac:
    strategy:
      fail-fast: false
    runs-on: macos-15-intel
    name: '🍏 macOS'
    steps:

    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install
      run: |
        brew install bison z3
        pip3 install --break-system-packages docopt || pip3 install docopt

    - name: Build
      run: |
        export PATH="$(brew --prefix bison)/bin:$PATH"
        export CPPFLAGS="-I$(brew --prefix z3)/include"
        export LDFLAGS="-L$(brew --prefix z3)/lib"
        autoconf
        ./configure --enable-libveriuser
        make -j$(sysctl -n hw.logicalcpu)

    - name: Self-check
      run: |
        export PATH="$(brew --prefix bison)/bin:$PATH"
        export CPPFLAGS="-I$(brew --prefix z3)/include"
        export LDFLAGS="-L$(brew --prefix z3)/lib"
        make check

    - name: Install binary
      run: sudo make install

    - name: Regression tests
      continue-on-error: true
      run: ./.github/test.sh


  lin:
    strategy:
      fail-fast: false
      matrix:
        os: [
          '22.04',
          '24.04'
        ]
    runs-on: ubuntu-${{ matrix.os }}
    name: '🐧 Ubuntu ${{ matrix.os }}'
    steps:

    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install
      run: |
        sudo apt update -qq
        sudo apt install -y make g++ git bison flex gperf libreadline-dev libbz2-dev autoconf python3-sphinx python3-docopt libz3-dev

    - name: Build
      run: |
        autoconf
        ./configure --enable-libveriuser
        make -j$(nproc)

    - name: Self-check
      run: make check

    - name: Install binary
      run: sudo make install

    - name: Regression tests
      continue-on-error: true
      run: ./.github/test.sh

    - name: Documentation
      run: |
        cd Documentation
        make html


  win:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { msystem: MINGW64, env: x86_64 }
          - { msystem: UCRT64,  env: ucrt-x86_64 }
          - { msystem: CLANG64, env: clang-x86_64 }
    name: 🟪 ${{ matrix.msystem}}
    defaults:
      run:
        shell: msys2 {0}
    env:
      MINGW_ARCH: ${{ matrix.msystem }}
    steps:

    - run: git config --global core.autocrlf input
      shell: bash

    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - uses: msys2/setup-msys2@v2
      with:
        msystem: ${{ matrix.msystem }}
        update: true
        install: >
          git
          base-devel
          mingw-w64-${{ matrix.env }}-python-pip
          mingw-w64-${{ matrix.env }}-perl
          mingw-w64-${{ matrix.env }}-z3

    - name: Install Python dependencies
      run: pip3 install docopt

    - name: Build and self-check
      run: |
        cd msys2
        if [ "${{ matrix.msystem }}" != "CLANG64" ] ; then
            export IVL_CONFIG_OPTIONS="--enable-libveriuser"
        fi
        makepkg-mingw --noconfirm --noprogressbar -sCLf

    - name: Install binary
      run: pacman -U --noconfirm msys2/*.zst

    - name: Regression tests
      continue-on-error: true
      run: |
        if [ "${{ matrix.msystem }}" = "CLANG64" ] ; then
            ./.github/test.sh no-pli1
        else
            ./.github/test.sh
        fi

    - uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.msystem }}
        path: msys2/*.zst
