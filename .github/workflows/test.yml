name: test

on:
  # Every push onto the main branch triggers a retest.
  push:
    branches:
      - main
  # All pull_requests trigger a retest.
  pull_request:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  mac:
    strategy:
      fail-fast: false
    runs-on: macos-15-intel
    name: '🍏 macOS'
    steps:

    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install
      run: |
        brew install bison z3 libffi
        pip3 install --break-system-packages docopt || pip3 install docopt

    - name: Build
      run: |
        export PATH="$(brew --prefix bison)/bin:$PATH"
        export CPPFLAGS="-I$(brew --prefix z3)/include -I$(brew --prefix libffi)/include"
        export LDFLAGS="-L$(brew --prefix z3)/lib -L$(brew --prefix libffi)/lib"
        autoconf
        ./configure --enable-libveriuser
        make -j$(sysctl -n hw.logicalcpu)

    - name: Self-check
      run: |
        export PATH="$(brew --prefix bison)/bin:$PATH"
        export CPPFLAGS="-I$(brew --prefix z3)/include -I$(brew --prefix libffi)/include"
        export LDFLAGS="-L$(brew --prefix z3)/lib -L$(brew --prefix libffi)/lib"
        make check

    - name: Install binary
      run: sudo make install

    - name: Regression tests
      continue-on-error: true
      run: ./.github/test.sh

    # macOS UVM now builds and loads the real DPI umbrella and passes 205/0
    # (verified in CI), so this step gates for real — a regression here fails
    # the job instead of hiding under continue-on-error.
    - name: UVM regression tests
      run: ./.github/uvm_test.sh

    # Validate the simplified `iverilog -uvm' front end end-to-end against a
    # freshly installed, relocated toolchain (real DPI, custom prefix).
    - name: UVM front-end regression
      run: ./.github/uvm_frontend_test.sh


  lin:
    strategy:
      fail-fast: false
      matrix:
        os: [
          '22.04',
          '24.04'
        ]
    runs-on: ubuntu-${{ matrix.os }}
    name: '🐧 Ubuntu ${{ matrix.os }}'
    steps:

    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install
      run: |
        sudo apt update -qq
        sudo apt install -y make g++ git bison flex gperf libreadline-dev libbz2-dev autoconf python3-sphinx python3-docopt libz3-dev libffi-dev

    - name: Build
      run: |
        autoconf
        ./configure --enable-libveriuser
        make -j$(nproc)

    - name: Self-check
      run: make check

    - name: Install binary
      run: sudo make install

    - name: ivtest gate (name-diff, hard)
      run: ./.github/ivtest_gate.sh

    - name: UVM regression tests (hard)
      run: ./.github/uvm_test.sh

    # Validate the simplified `iverilog -uvm' front end end-to-end against a
    # freshly installed, relocated toolchain (real DPI, custom prefix).
    - name: UVM front-end regression (hard)
      run: ./.github/uvm_frontend_test.sh

    - name: Documentation
      run: |
        cd Documentation
        make html


  win:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { msystem: MINGW64, env: x86_64 }
          - { msystem: UCRT64,  env: ucrt-x86_64 }
          - { msystem: CLANG64, env: clang-x86_64 }
    name: 🟪 ${{ matrix.msystem}}
    defaults:
      run:
        shell: msys2 {0}
    env:
      MINGW_ARCH: ${{ matrix.msystem }}
    steps:

    - run: git config --global core.autocrlf input
      shell: bash

    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - uses: msys2/setup-msys2@v2
      with:
        msystem: ${{ matrix.msystem }}
        update: true
        install: >
          git
          base-devel
          mingw-w64-${{ matrix.env }}-python-pip
          mingw-w64-${{ matrix.env }}-perl
          mingw-w64-${{ matrix.env }}-z3
          mingw-w64-${{ matrix.env }}-libffi
          mingw-w64-${{ matrix.env }}-libsystre

    - name: Install Python dependencies
      run: pip3 install docopt

    - name: Build and self-check
      run: |
        cd msys2
        if [ "${{ matrix.msystem }}" != "CLANG64" ] ; then
            export IVL_CONFIG_OPTIONS="--enable-libveriuser"
        fi
        makepkg-mingw --noconfirm --noprogressbar -sCLf

    - name: Install binary
      run: pacman -U --noconfirm msys2/*.zst

    - name: DPI/regex diagnostic probe
      continue-on-error: true
      run: bash .github/win_dpi_probe.sh 2>&1 | tee "win_probe_${{ matrix.msystem }}.txt"

    - name: Upload probe output
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: probe-${{ matrix.msystem }}
        path: win_probe_${{ matrix.msystem }}.txt

    - name: Regression tests
      continue-on-error: true
      run: |
        if [ "${{ matrix.msystem }}" = "CLANG64" ] ; then
            ./.github/test.sh no-pli1
        else
            ./.github/test.sh
        fi

    # Windows UVM runs real DPI and passes 209/0 on all three MSYS2
    # toolchains (verified in CI after the vvp.def export, GMP-Z3 numeral
    # extraction, and per-toolchain compiler fixes), so this step gates for
    # real — a regression here fails the job instead of hiding under
    # continue-on-error. The plain regression suite above keeps its soft
    # gate: its Windows baseline has known non-UVM deltas that are tracked
    # separately.
    - name: UVM regression tests
      run: ./.github/uvm_test.sh

    # Validate the `iverilog -uvm' front end on the INSTALLED Windows toolchain
    # (pacman-installed above), which carries uvm_dpi.vpi only if installuvm's
    # Windows hand-rolled umbrella build succeeded during packaging. Asserts
    # REAL DPI (not a UVM_NO_DPI fallback) via a necessity contrast, so a silent
    # revert to no-DPI fails here.
    - name: UVM front-end (installed toolchain, real DPI)
      run: |
        set -e
        base="$(dirname "$(dirname "$(command -v iverilog)")")/lib/ivl"
        echo "resolved toolchain base: $base"
        test -f "$base/uvm_dpi.vpi" \
          || { echo "FAIL: uvm_dpi.vpi not installed (installuvm fell back to UVM_NO_DPI)"; exit 1; }
        test -f "$base/uvm/src/uvm_pkg.sv" || { echo "FAIL: UVM sources not installed"; exit 1; }
        cp tests/reg_basic_test.sv "$TMP/fe_tb.sv" 2>/dev/null || cp tests/reg_basic_test.sv /tmp/fe_tb.sv
        work="${TMP:-/tmp}"; cd "$work"
        iverilog -g2012 -uvm -o fe.vvp fe_tb.sv
        grep -q ':vpi_module "[^"]*uvm_dpi' fe.vvp \
          || { echo "FAIL: uvm_dpi not baked into the compiled program"; exit 1; }
        out="$(vvp fe.vvp 2>&1)"; echo "$out" | tail -6
        echo "$out" | grep -q 'UVM_ERROR :    0' || { echo "FAIL: run not clean"; exit 1; }
        if echo "$out" | grep -q 'DPI error'; then echo "FAIL: unresolved DPI symbols"; exit 1; fi
        # Necessity: the same design in real-DPI mode with NO provider must
        # report the missing native symbols, proving DPI is genuinely used.
        iverilog -g2012 -I "$base/uvm/src" -o nomod.vvp "$base/uvm/src/uvm_pkg.sv" fe_tb.sv
        vvp nomod.vvp 2>&1 | grep -q 'DPI error' \
          || { echo "FAIL: necessity check — design did not need native DPI"; exit 1; }
        echo "PASS: iverilog -uvm runs REAL DPI on the installed Windows toolchain"

    - uses: actions/upload-artifact@v4
      if: always()
      with:
        name: ${{ matrix.msystem }}
        path: msys2/*.zst
